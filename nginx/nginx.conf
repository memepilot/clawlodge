server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://web-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://web-api:8000/healthz;
    }

    location /docs {
        proxy_pass http://web-api:8000/docs;
    }

    location /redoc {
        proxy_pass http://web-api:8000/redoc;
    }

    location /openapi.json {
        proxy_pass http://web-api:8000/openapi.json;
    }

    location / {
        proxy_pass http://web-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
